<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sentinel — the approval layer for AI agents that take action">
  <rect width="1280" height="360" rx="24" fill="#0A0A0A"/>
  <!-- subtle grid dots -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="120" cy="80" r="2"/><circle cx="180" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="1160" cy="280" r="2"/><circle cx="1100" cy="280" r="2"/><circle cx="1040" cy="280" r="2"/>
    <circle cx="1160" cy="320" r="2"/><circle cx="1100" cy="320" r="2"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="170" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="600" font-size="92" letter-spacing="-4" fill="#ffffff">Sentinel</text>
  <text x="612" y="118" font-family="Arial, sans-serif" font-weight="600" font-size="26" fill="#ffffff">®</text>

  <!-- tagline -->
  <text x="82" y="222" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="27" letter-spacing="-0.5" fill="#9b9b9b">The approval layer for AI agents that take action.</text>

  <!-- verdict pills -->
  <g font-family="Arial, sans-serif" font-weight="700" font-size="17" letter-spacing="1">
    <rect x="82" y="266" width="118" height="42" rx="21" fill="#17c964" fill-opacity="0.12" stroke="#17c964" stroke-opacity="0.35"/>
    <text x="141" y="293" text-anchor="middle" fill="#3ddc84">ALLOW</text>

    <rect x="216" y="266" width="104" height="42" rx="21" fill="#b42318" fill-opacity="0.12" stroke="#b42318" stroke-opacity="0.35"/>
    <text x="268" y="293" text-anchor="middle" fill="#ff6b5e">DENY</text>

    <rect x="336" y="266" width="104" height="42" rx="21" fill="#b47800" fill-opacity="0.14" stroke="#b47800" stroke-opacity="0.4"/>
    <text x="388" y="293" text-anchor="middle" fill="#f2c14e">HOLD</text>
  </g>

  <!-- monospace decision snippet on the right -->
  <g font-family="'Courier New', monospace" font-size="19" fill="#6b6b6b">
    <text x="820" y="150">POST /v1/agents/{id}/actions/check</text>
    <text x="820" y="184" fill="#8a8a8a">{ "tool": "refund",</text>
    <text x="820" y="212" fill="#8a8a8a">  "arguments": { "amount": 5000 } }</text>
    <text x="820" y="250" fill="#f2c14e">→ HELD  ·  refunds over $100 need a human</text>
  </g>
</svg>
