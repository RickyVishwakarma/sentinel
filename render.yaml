# One-click Render blueprint: gateway (Docker) + managed Postgres.
# Dashboard deploys separately (e.g. Vercel, root directory `dashboard/`) —
# point its Gateway URL setting at this service's public URL.
services:
  - type: web
    name: sentinel-gateway
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-db
          property: connectionString
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      # Set in the Render dashboard if you want live providers / judge:
      # ANTHROPIC_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY
      # CORS: add your dashboard origin, e.g.
      # CORS_ORIGINS=["https://sentinel-dashboard.vercel.app"]

databases:
  - name: sentinel-db
    plan: free
